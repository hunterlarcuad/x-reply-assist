<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AssistX Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sidebar-header">
    <img class="sidebar-logo" src="../assets/icon.png" alt="AssistX" />
    <h2 class="sidebar-title">AssistX</h2><button id="theme-toggle" class="theme-btn" title="切换主题">☀️</button>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="reply" data-i18n="tab_reply">回复</button>
    <button class="tab-btn" data-tab="commands" data-i18n="tab_commands">指令库</button>
    <button class="tab-btn" data-tab="settings" data-i18n="tab_settings">设置</button>
  </div>

  <div class="tab-content">
    <!-- Reply Tab -->
    <div class="tab-panel active" id="tab-reply">
      <div class="section-box">
        <div class="section-header">
          <span class="section-title" data-i18n="post_title">📝 当前帖子</span>
          <button class="btn-icon" id="assistx-refreshPost" title="刷新推文">🔄</button>
        </div>
        <div id="assistx-postContent">
          <div class="post-placeholder" data-i18n="post_placeholder">正在提取推文内容...</div>
        </div>

        <div class="form-group" style="margin-top: 12px; margin-bottom: 0;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:12px; color:var(--text-muted); cursor:pointer; font-weight:600; user-select:none;" id="assistx-toggleManualInput">▶ <span data-i18n="manual_input_toggle">手动输入推文 (可选)</span></span>
            <button class="btn-icon" id="assistx-clearManualInput" title="清空" style="display:none; font-size:12px; padding:2px 6px;" data-i18n="manual_input_clear">清空</button>
          </div>
          <textarea id="assistx-manualInput" style="display:none; width:100%; min-height:80px; margin-top:8px; padding:8px; background:var(--bg-color); border-radius:8px; border:1px dashed var(--border-color); font-size:12px; color:var(--text-color); resize:vertical; box-sizing: border-box;"></textarea>
        </div>
      </div>

      <div class="section-box">
        <div class="section-header">
          <span class="section-title" data-i18n="ai_title">⚡ 智能回复生成</span>
          <div id="assistx-generationTime" style="display:none; font-size:11px; color:var(--text-muted); margin-left:auto;">
            <span data-i18n="time_cost">耗时:</span> <span id="assistx-timeNum">0</span>s
          </div>
        </div>
        
        <div class="quick-commands-container">
          <button class="scroll-btn scroll-left hidden" id="assistx-scrollLeft">‹</button>
          <div class="quick-commands" id="assistx-quickCmds">
            <!-- 动态加载指令按钮 -->
          </div>
          <button class="scroll-btn scroll-right hidden" id="assistx-scrollRight">›</button>
        </div>

                <div class="form-group" style="display:flex; align-items:center; justify-content:space-between; margin-top:12px;">
          <div style="display:flex; align-items:center; gap:8px; flex:1;">
            <select id="assistx-modelSelect-reply" class="form-select" style="width:auto; max-width:160px; padding:2px 6px; font-size:11px; height:24px; border-radius:12px;"></select>
            <label class="form-label" style="margin-bottom:0; font-size:11px; margin-left: auto; text-align: right; margin-right: 8px;" data-i18n="prompt_preview">指令预览</label>
          </div>
          <button class="btn-icon" id="assistx-expandPrompt" title="查看完整提示词">👁️</button>
        </div>
        <textarea id="assistx-promptPreview" style="display:none; width:100%; min-height:120px; margin-top:8px; padding:10px; background:var(--surface-color); border-radius:8px; border:1px solid var(--primary-color); font-size:11px; color:var(--text-color); resize:vertical; line-height:1.4; box-sizing: border-box;"></textarea>

        <div class="form-group" style="margin-top:12px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <div style="display:flex; align-items:center; gap:8px;">
            <label class="form-label" style="margin-bottom:0;" data-i18n="reply_lang_label">回复语言:</label>
            <select id="assistx-replyLangSelect" class="form-select" style="width:70px; padding:4px 8px;">
              <option value="auto" data-i18n="reply_lang_auto">自动</option>
              <option value="zh" data-i18n="reply_lang_zh">中文</option>
              <option value="en" data-i18n="reply_lang_en">英语</option>
            </select>
          </div>
          <div style="display:flex; align-items:center; gap:8px; margin-left: auto;">
            <label class="form-label" style="margin-bottom:0;" data-i18n="word_limit">字数限制:</label> 
            <input type="number" id="assistx-wordLimit" class="form-input" value="70" step="10" min="10" style="width:60px; padding:4px 8px;" />
          </div>
        </div>

        <button class="btn-primary" id="assistx-generateReply" data-i18n="gen_btn">生成回复内容</button>
        
        <div id="assistx-aiResponse">
          <div id="assistx-aiPlaceholder" style="display:none; text-align:center; padding:10px; color:var(--text-muted);"></div>
          
          <!-- 全部结果列表视图 -->
          <div id="assistx-allResults" style="display:none; margin-top:10px;"></div>

          <!-- 单个结果编辑视图 -->
          <div id="assistx-singleResult" style="display:none;">
            <textarea id="assistx-aiResponseText" style="width:100%; min-height:100px; margin-top:10px; border-radius:8px; border:1px solid var(--border-color); padding:8px; background:var(--surface-color); color:var(--text-color); box-sizing: border-box;"></textarea>
          </div>

          <!-- 共享结果状态栏 (耗时与字数) -->
          <div id="assistx-resultStatus" style="display:none; justify-content:space-between; align-items:center; margin-top:6px; padding:0 4px;">
            <div id="assistx-wordCount" style="display:flex; font-size:11px; color:var(--text-muted);">
              <span id="assistx-wordCountNum">0</span> <span data-i18n="word_char">字符</span>
            </div>
          </div>

          <div class="ai-actions" id="assistx-aiActions" style="display:none;">
            <button class="btn-secondary" id="assistx-copyReply" data-i18n="btn_copy">复制</button>
            <button class="btn-secondary" id="assistx-insertReply" data-i18n="btn_insert">插入</button>
            <button class="btn-primary" id="assistx-publishReply" style="flex:1.5;" data-i18n="btn_publish">发布</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Commands Tab -->
    <div class="tab-panel" id="tab-commands">
      <div class="section-box">
        <div class="section-header">
          <span class="section-title" data-i18n="cmd_title">🎨 自定义指令</span>
          <button id="assistx-addCommand" class="btn-icon">+</button>
        </div>
        <input type="text" id="assistx-commandSearch" placeholder="搜索指令模板..." class="form-input" style="margin-bottom:12px;" />
        <div id="assistx-commandList" class="command-list"></div>
      </div>
    </div>

    <!-- Settings Tab -->
    <div class="tab-panel" id="tab-settings">
      <div class="section-box">
        <div class="section-header"><span class="section-title" data-i18n="settings_account">👤 当前账号</span></div>
        <div id="account-info" style="display:flex; align-items:center; gap:10px;">
          <div id="assistx-accountAvatar" style="width:40px; height:40px; border-radius:50%; background:#eee; background-size:cover;"></div>
          <div>
            <div id="assistx-accountName" style="font-weight:600; font-size:14px;" data-i18n="account_loading">加载中...</div>
            <div id="assistx-accountHandle" style="color:var(--text-muted); font-size:12px;">@unknown</div>
          </div>
        </div>
      </div>

      <div class="section-box">
        <div class="section-header"><span class="section-title" data-i18n="settings_title">🔑 API & 模型</span></div>
        <div class="form-group">
          <label class="form-label" data-i18n="lang_label">界面语言</label>
          <select id="assistx-langSelect" class="form-select">
            <option value="zh">中文 (简体)</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="provider_label">服务商</label>
          <select id="assistx-provider" class="form-select">
            <option value="glm">Zhipu AI (GLM)</option>
            <option value="custom">自定义 (Custom)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="available_models_label">可用模型列表 (逗号分隔)</label>
          <textarea id="assistx-customModels" class="form-input" style="min-height:40px; font-size:11px;" placeholder="e.g. glm-4.7-flash, mimo-v2.5-pro, gpt-4o"></textarea>
        </div>
        
        <div id="assistx-customProviderSection" style="display:none; border-left: 3px solid var(--primary-color); padding-left: 12px; margin-bottom: 12px;">
          <div class="form-group">
            <label class="form-label" data-i18n="provider_name_label">服务商名称</label>
            <div style="display:flex; gap:8px;">
              <select id="assistx-providerName" class="form-select" style="flex:1;"></select>
              <button class="btn-icon" id="assistx-addProvider" title="新增服务商">+</button>
              <button class="btn-icon" id="assistx-deleteProvider" title="删除该服务商" style="color:#e0245e; border-color:#e0245e; opacity:0.7;">🗑️</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="protocol_type_label">协议类型</label>
            <select id="assistx-protocolType" class="form-select">
              <option value="openai">OpenAI API</option>
              <option value="anthropic">Anthropic API</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="api_url_label">API Base URL</label>
          <input type="text" id="assistx-baseUrl" class="form-input" placeholder="https://open.bigmodel.cn/api/anthropic" />
        </div>
        <div class="form-group">
          <label class="form-label">API Key</label>
          <input type="text" id="assistx-apiKey" class="form-input" placeholder="id.secret" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="model_label">AI 模型</label>
          <div class="select-wrapper">
            <select id="assistx-modelSelect" class="form-select"></select>
            <button id="assistx-refreshModels" class="btn-icon">🔄</button>
          </div>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn-secondary" id="assistx-testBtn" data-i18n="test_conn" style="flex:1;">测试连接</button>
        </div>
        <div id="assistx-status" class="status-message"></div>
      </div>
    </div>
  </div>

  <div class="sidebar-footer">Powered by @ablenavy</div>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
